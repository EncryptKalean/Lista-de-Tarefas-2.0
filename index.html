  <body>
    <header>
      <h1>
        <span>Complete.</span>
        <span>Sinta.</span>
        <span>Repita.</span>
      </h1>

      <p>Transforme tarefa em pequenas vitórias diárias.</p>

      <span class="linha" aria-hidden="true"></span>
    </header>

    <main>
      <section id="core">
        <div class="center">
          <div id="input_container">
            <input type="text" placeholder="Digite sua tarefa..." />
            <button>Adicionar</button>
          </div>

          <div class="" id="sequencia">
            <h2>
              <svg><use href="#icon_fogo" /></svg>
              <span>0</span>tarefas concluidas
            </h2>
          </div>

          <div id="barra_progresso">
            <div id="barra_desprogresso"></div>
          </div>

          <span class="linha"></span>

          <ul>
            <div class="" id="msg_motivacional">
              <span
                >BOA!!
                <svg><use href="#icon_foguete" /></svg>
              </span>
            </div>

            <span id="separacao_mensagem_motivacional" class="linha"> </span>

            <div id="tarefas_container">
              <!-- <li class="recem_criado">
                <input type="checkbox" id="" />
                <div class="checkbox">
                  <svg>
                    <use href="#icon_correct" />
                  </svg>
                </div>
                <span>TAREFA 1</span>
              </li> -->
            </div>
          </ul>

          <button id="delete_all">
            <svg><use href="#icon_lixo" /></svg>
          </button>

          <div class="" id="delete_alerta">
            <svg><use href="#icon_lixo" /></svg>
            <h2>Você realmente quer apagar todas as tarefas?</h2>
            <h3>Essa ação não pode ser desfeita</h3>

            <div>
              <button id="cancelar">Cancelar</button>
              <button id="confirmar">Confirmar</button>
            </div>
          </div>
        </div>
        <!-- CENTER -->
      </section>
      <!-- CORE -->
    </main>
